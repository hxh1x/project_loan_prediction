<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lendmark - Applications</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="js/theme-config.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-background text-foreground antialiased">
  <div class="app-layout">
    <div id="sidebar-container" class="sidebar-wrapper"></div>
    <main class="main-content">
      <div class="p-8 max-w-7xl mx-auto">
        <div class="mb-8">
          <h1 id="page-title" class="text-2xl font-semibold tracking-tight">Applications</h1>
          <p id="page-desc" class="text-sm text-muted-foreground mt-1">Track and manage loan applications</p>
        </div>

        <!-- Filter Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
          <button id="filter-all" onclick="setFilter('all')" class="bg-card p-4 rounded-xl border shadow-sm text-left hover:bg-muted/50 transition-colors border-primary/20 bg-muted/30">
            <p class="text-xs text-muted-foreground mb-1">Total</p>
            <p id="count-all" class="text-2xl font-bold">0</p>
          </button>
          <button id="filter-pending" onclick="setFilter('pending')" class="bg-card p-4 rounded-xl border shadow-sm text-left hover:bg-muted/50 transition-colors border-transparent">
            <p class="text-xs text-muted-foreground mb-1">Pending</p>
            <p id="count-pending" class="text-2xl font-bold">0</p>
          </button>
          <button id="filter-approved" onclick="setFilter('approved')" class="bg-card p-4 rounded-xl border shadow-sm text-left hover:bg-muted/50 transition-colors border-transparent">
            <p class="text-xs text-muted-foreground mb-1">Approved</p>
            <p id="count-approved" class="text-2xl font-bold text-primary">0</p>
          </button>
          <button id="filter-rejected" onclick="setFilter('rejected')" class="bg-card p-4 rounded-xl border shadow-sm text-left hover:bg-muted/50 transition-colors border-transparent">
            <p class="text-xs text-muted-foreground mb-1">Rejected</p>
            <p id="count-rejected" class="text-2xl font-bold text-destructive">0</p>
          </button>
        </div>

        <!-- Search -->
        <div class="bg-card rounded-xl border shadow-sm mb-6 p-4">
          <div class="relative">
            <i data-lucide="search" size="16" class="absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"></i>
            <input type="text" id="search-input" oninput="renderTable()" placeholder="Search by applicant name..."
              class="w-full pl-9 pr-4 py-2 text-sm bg-background border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors">
          </div>
        </div>

        <!-- Table -->
        <div class="bg-card rounded-xl border shadow-sm overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-muted/50 border-b">
                <tr>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">Applicant</th>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">Amount</th>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">Income</th>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">CIBIL</th>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">AI Result</th>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">Status</th>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">Date</th>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">Action</th>
                </tr>
              </thead>
              <tbody id="apps-table-body" class="divide-y divide-border">
                <tr><td colspan="8" class="text-center py-12 text-sm text-muted-foreground">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Detail Modal -->
  <div id="detail-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-card rounded-2xl border shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between p-6 border-b">
        <h3 class="font-semibold text-lg">Application Details</h3>
        <button onclick="closeModal()" class="p-2 hover:bg-muted rounded-lg transition-colors">
          <i data-lucide="x" size="18"></i>
        </button>
      </div>
      <div id="modal-body" class="p-6"></div>
    </div>
  </div>

  <script src="js/api-client.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/loan-predictor.js"></script>
  <script>
    let allApps = [];
    let currentFilter = 'all';
    let isManager = false;

    document.addEventListener('DOMContentLoaded', async () => {
      const user = await window.api.verifySession();
      if (!user) { window.location.href = 'auth.html'; return; }
      isManager = user.role === 'manager';
      window.currentUser = user;

      document.getElementById('page-title').textContent = isManager ? 'All Applications' : 'My Applications';
      document.getElementById('page-desc').textContent = isManager
        ? 'Review and manage all loan applications'
        : 'Track your loan application status';

      await initDashboard();
      await fetchApplications();
    });

    async function fetchApplications() {
      const data = await window.api.getApplications().catch(() => []);
      allApps = data;
      updateCounts();
      renderTable();
    }

    function updateCounts() {
      document.getElementById('count-all').textContent = allApps.length;
      document.getElementById('count-pending').textContent = allApps.filter(a => a.status === 'pending').length;
      document.getElementById('count-approved').textContent = allApps.filter(a => a.status === 'approved').length;
      document.getElementById('count-rejected').textContent = allApps.filter(a => a.status === 'rejected').length;
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('[id^="filter-"]').forEach(c => {
        c.classList.remove('border-primary/20', 'bg-muted/30');
        c.classList.add('border-transparent');
      });
      const active = document.getElementById(`filter-${filter}`);
      if (active) { active.classList.remove('border-transparent'); active.classList.add('border-primary/20', 'bg-muted/30'); }
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('apps-table-body');
      const search = document.getElementById('search-input').value.toLowerCase();
      const filtered = allApps.filter(a =>
        (currentFilter === 'all' || a.status === currentFilter) &&
        (!search || (a.applicant_name || '').toLowerCase().includes(search))
      );
      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-12 text-sm text-muted-foreground">No applications found</td></tr>';
        return;
      }
      const predColor = (s) => s === 'Approved'
        ? 'bg-primary/10 text-primary border border-primary/20'
        : 'bg-destructive/10 text-destructive border border-destructive/20';
      const statusColor = { pending: 'bg-accent text-accent-foreground', approved: 'bg-primary/10 text-primary border border-primary/20', rejected: 'bg-destructive/10 text-destructive border border-destructive/20' };
      tbody.innerHTML = filtered.map(a => `
        <tr class="hover:bg-muted/50 transition-colors">
          <td class="px-5 py-4 font-medium">${a.applicant_name}</td>
          <td class="px-5 py-4 text-muted-foreground">${window.loanPredictor.formatCurrency(a.loan_amount)}</td>
          <td class="px-5 py-4 text-muted-foreground">${window.loanPredictor.formatCurrency(a.income_annum)}</td>
          <td class="px-5 py-4 font-medium ${a.cibil_score > 750 ? 'text-primary' : 'text-muted-foreground'}">${a.cibil_score}</td>
          <td class="px-5 py-4"><span class="inline-flex items-center px-2 py-1 rounded-md text-xs font-medium ${predColor(a.prediction_status)}">${a.prediction_status} ${a.confidence}%</span></td>
          <td class="px-5 py-4"><span class="inline-flex items-center px-2 py-1 rounded-md text-xs font-medium ${statusColor[a.status] || ''}">${a.status.charAt(0).toUpperCase()+a.status.slice(1)}</span></td>
          <td class="px-5 py-4 text-sm text-muted-foreground">${new Date(a.created_at).toLocaleDateString()}</td>
          <td class="px-5 py-4">
            <button onclick="viewDetails('${a.id}')" class="inline-flex items-center gap-2 rounded-md text-sm font-medium border bg-background shadow-sm hover:bg-accent h-8 px-3 transition-colors">
              <i data-lucide="eye" size="14"></i> View
            </button>
          </td>
        </tr>`).join('');
      lucide.createIcons();
    }

    function viewDetails(id) {
      const a = allApps.find(x => x.id === id);
      const modal = document.getElementById('detail-modal');
      const pColor = a.prediction_status === 'Approved' ? 'text-primary' : 'text-destructive';
      document.getElementById('modal-body').innerHTML = `
        <div class="grid grid-cols-2 gap-4 mb-6">
          ${[
            ['Applicant Name', a.applicant_name],
            ['Education', a.education],
            ['Annual Income', window.loanPredictor.formatCurrency(a.income_annum)],
            ['Loan Amount', window.loanPredictor.formatCurrency(a.loan_amount)],
            ['Loan Term', `${a.loan_term} Months`],
            ['Monthly EMI', window.loanPredictor.formatCurrency(a.monthly_emi || 0)],
            ['EMI Day', `${a.emi_day}${a.emi_day == 1 ? 'st' : a.emi_day == 5 ? 'th' : 'th'} of month`],
            ['CIBIL Score', a.cibil_score],
            ['Self Employed', a.self_employed],
            ['Dependents', a.no_of_dependents],
          ].map(([l, v]) => `
            <div class="space-y-1">
              <p class="text-xs text-muted-foreground font-medium">${l}</p>
              <p class="text-sm font-medium">${v}</p>
            </div>`).join('')}
        </div>
        <div class="p-4 rounded-lg border bg-muted/50 mb-6 flex justify-between items-center">
          <div>
            <p class="text-xs text-muted-foreground font-medium mb-1">AI Recommendation</p>
            <p class="text-lg font-semibold ${pColor}">${a.prediction_status}</p>
          </div>
          <div class="text-right">
            <p class="text-xs text-muted-foreground font-medium mb-1">Confidence</p>
            <p class="text-lg font-semibold">${a.confidence}%</p>
          </div>
        </div>
        ${isManager && a.status === 'pending' ? `
          <div class="flex gap-3">
            <button onclick="decide('${a.id}','approved')" class="flex-1 bg-primary text-primary-foreground rounded-lg py-2.5 text-sm font-medium hover:opacity-90 transition-all">Approve Loan</button>
            <button onclick="decide('${a.id}','rejected')" class="flex-1 border rounded-lg py-2.5 text-sm font-medium hover:bg-destructive hover:text-destructive-foreground transition-all">Reject Loan</button>
          </div>` : ''}`;
      lucide.createIcons();
      modal.classList.remove('hidden');
    }

    function closeModal() { document.getElementById('detail-modal').classList.add('hidden'); }

    async function decide(id, status) {
      try {
        await window.api.updateApplication(id, { status });
        closeModal();
        await fetchApplications();
      } catch (err) {
        alert(err.message);
      }
    }
  </script>
</body>
</html>

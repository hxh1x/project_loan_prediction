<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lendmark - Transactions</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="js/theme-config.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-background text-foreground antialiased">
  <div class="app-layout">
    <div id="sidebar-container" class="sidebar-wrapper"></div>
    <main class="main-content">
      <div class="p-8 max-w-7xl mx-auto">
        <div class="mb-8 flex items-center justify-between">
          <div>
            <h1 class="text-2xl font-semibold tracking-tight">Transactions</h1>
            <p class="text-sm text-muted-foreground mt-1">Financial transaction history</p>
          </div>
          <button id="new-txn-btn" class="hidden items-center gap-2 bg-primary text-primary-foreground px-4 py-2.5 rounded-lg text-sm font-medium shadow-sm hover:opacity-90 transition-all">
            <i data-lucide="plus" size="16"></i> New Entry
          </button>
        </div>

        <!-- New Transaction Form (manager only) -->
        <div id="txn-form" class="hidden mb-6 bg-card p-6 rounded-xl border shadow-sm">
          <h3 class="text-base font-semibold mb-5 flex items-center gap-2">
            <i data-lucide="receipt" size="18" class="text-primary"></i> New Transaction
          </h3>
          <form id="create-txn-form" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="space-y-2 sm:col-span-2">
              <label class="text-sm font-medium">Customer</label>
              <select id="txn-user-id" required class="w-full bg-background border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-colors">
                <option value="">Select customer...</option>
              </select>
            </div>
            <div class="space-y-2">
              <label class="text-sm font-medium">Type</label>
              <select id="txn-type" required class="w-full bg-background border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-colors">
                <option value="credit">Credit (Deposit)</option>
                <option value="debit">Debit (Withdrawal)</option>
              </select>
            </div>
            <div class="space-y-2">
              <label class="text-sm font-medium">Amount (₹)</label>
              <input type="number" id="txn-amount" required min="1" placeholder="Enter amount"
                class="w-full bg-background border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-colors">
            </div>
            <div class="space-y-2 sm:col-span-2">
              <label class="text-sm font-medium">Description</label>
              <input type="text" id="txn-desc" required placeholder="Transaction description"
                class="w-full bg-background border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-colors">
            </div>
            <div class="sm:col-span-2 flex gap-3 pt-2">
              <button type="submit" id="txn-submit-btn" class="bg-primary text-primary-foreground px-5 py-2.5 rounded-lg text-sm font-medium shadow-sm hover:opacity-90 transition-all">
                Authorize Entry
              </button>
              <button type="button" onclick="toggleForm()" class="border px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-muted transition-colors">
                Cancel
              </button>
            </div>
          </form>
        </div>

        <!-- Summary cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
          <div class="bg-card p-5 rounded-xl border shadow-sm">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-xs text-muted-foreground mb-1">Current Balance</p>
                <h2 id="balance-val" class="text-2xl font-semibold">₹0</h2>
              </div>
              <div class="h-9 w-9 bg-primary/10 text-primary rounded-lg flex items-center justify-center border border-primary/20">
                <i data-lucide="wallet" size="18"></i>
              </div>
            </div>
          </div>
          <div class="bg-card p-5 rounded-xl border shadow-sm">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-xs text-muted-foreground mb-1">Total Credits</p>
                <h2 id="credit-val" class="text-2xl font-semibold text-primary">₹0</h2>
              </div>
              <div class="h-9 w-9 bg-primary/10 text-primary rounded-lg flex items-center justify-center border border-primary/20">
                <i data-lucide="arrow-down-left" size="18"></i>
              </div>
            </div>
          </div>
          <div class="bg-card p-5 rounded-xl border shadow-sm">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-xs text-muted-foreground mb-1">Total Debits</p>
                <h2 id="debit-val" class="text-2xl font-semibold text-destructive">₹0</h2>
              </div>
              <div class="h-9 w-9 bg-destructive/10 text-destructive rounded-lg flex items-center justify-center border border-destructive/20">
                <i data-lucide="arrow-up-right" size="18"></i>
              </div>
            </div>
          </div>
        </div>

        <!-- Table -->
        <div class="bg-card rounded-xl border shadow-sm overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-muted/50 border-b">
                <tr>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">Type</th>
                  <th id="th-customer" class="hidden px-5 py-3 text-left font-medium text-muted-foreground">Customer</th>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">Description</th>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">Amount</th>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">Balance</th>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">Date</th>
                </tr>
              </thead>
              <tbody id="txn-table-body" class="divide-y divide-border">
                <tr><td colspan="6" class="text-center py-12 text-sm text-muted-foreground">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/api-client.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/loan-predictor.js"></script>
  <script>
    let isManager = false;
    let transactions = [];
    let profiles = [];

    document.addEventListener('DOMContentLoaded', async () => {
      const user = await window.api.verifySession();
      if (!user) { window.location.href = 'auth.html'; return; }
      isManager = user.role === 'manager';
      window.currentUser = user;

      if (isManager) {
        document.getElementById('new-txn-btn').classList.remove('hidden');
        document.getElementById('new-txn-btn').classList.add('flex');
        document.getElementById('th-customer').classList.remove('hidden');
      }

      await initDashboard();
      await fetchData();
    });

    async function fetchData() {
      transactions = await window.api.getTransactions().catch(() => []);

      if (isManager) {
        profiles = await window.api.getProfiles().catch(() => []);
        const select = document.getElementById('txn-user-id');
        select.innerHTML = '<option value="">Select customer...</option>' +
          profiles.map(p => `<option value="${p.user_id}">${p.full_name || 'Unknown'} — ${p.account_number || ''}</option>`).join('');
      }

      renderPage();
    }

    function renderPage() {
      let displayTxns = transactions;
      let latestBalance = displayTxns.length > 0 ? displayTxns[0].balance : 0;

      const totalCredit = displayTxns.filter(t => t.type === 'credit').reduce((s, t) => s + t.amount, 0);
      const totalDebit  = displayTxns.filter(t => t.type === 'debit').reduce((s, t) => s + t.amount, 0);

      document.getElementById('balance-val').textContent = window.loanPredictor.formatCurrency(latestBalance);
      document.getElementById('credit-val').textContent  = window.loanPredictor.formatCurrency(totalCredit);
      document.getElementById('debit-val').textContent   = window.loanPredictor.formatCurrency(totalDebit);

      const tbody = document.getElementById('txn-table-body');
      if (!displayTxns.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-12 text-sm text-muted-foreground">No transactions found</td></tr>';
        return;
      }

      tbody.innerHTML = displayTxns.map(t => {
        const profile = profiles.find(p => p.user_id === t.user_id);
        const isCredit = t.type === 'credit';
        const customerCol = isManager ? `<td class="px-5 py-4 font-medium">${profile ? profile.full_name : 'Unknown'}</td>` : '';
        return `
          <tr class="hover:bg-muted/50 transition-colors">
            <td class="px-5 py-4">
              <span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-medium capitalize
                ${isCredit ? 'bg-primary/10 text-primary border border-primary/20' : 'bg-destructive/10 text-destructive border border-destructive/20'}">
                <i data-lucide="${isCredit ? 'arrow-down-left' : 'arrow-up-right'}" size="12" class="mr-1"></i>
                ${t.type}
              </span>
            </td>
            ${customerCol}
            <td class="px-5 py-4 font-medium">${t.description}</td>
            <td class="px-5 py-4 font-medium ${isCredit ? 'text-primary' : 'text-foreground'}">
              ${isCredit ? '+' : '-'}${window.loanPredictor.formatCurrency(t.amount)}
            </td>
            <td class="px-5 py-4 text-muted-foreground">${window.loanPredictor.formatCurrency(t.balance)}</td>
            <td class="px-5 py-4 text-muted-foreground text-sm">${new Date(t.created_at).toLocaleString([], { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' })}</td>
          </tr>`;
      }).join('');
      lucide.createIcons();
    }

    function toggleForm() {
      document.getElementById('txn-form').classList.toggle('hidden');
    }

    document.getElementById('create-txn-form').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('txn-submit-btn');
      btn.disabled = true;
      btn.textContent = 'Processing...';
      try {
        await window.api.createTransaction({
          user_id: document.getElementById('txn-user-id').value,
          type: document.getElementById('txn-type').value,
          amount: Number(document.getElementById('txn-amount').value),
          description: document.getElementById('txn-desc').value,
        });
        toggleForm();
        document.getElementById('create-txn-form').reset();
        await fetchData();
      } catch (err) {
        alert(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Authorize Entry';
      }
    };
  </script>
</body>
</html>

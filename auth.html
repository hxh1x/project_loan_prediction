<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lendmark - Sign In</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="js/theme-config.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-muted/40 text-foreground antialiased">
  <button id="theme-toggle" class="fixed top-5 right-5 p-2.5 rounded-full bg-background border shadow-sm text-foreground hover:bg-muted/50 transition-colors z-50">
    <i data-lucide="moon" class="hidden dark:block" size="18"></i>
    <i data-lucide="sun" class="block dark:hidden" size="18"></i>
  </button>

  <div class="w-full max-w-[400px] px-4">
    <div class="flex flex-col items-center mb-8">
      <div class="w-12 h-12 rounded-xl bg-primary shadow-sm flex items-center justify-center mb-4">
        <i data-lucide="layers" class="text-primary-foreground" size="24"></i>
      </div>
      <h1 class="text-2xl font-semibold tracking-tight">Lendmark</h1>
      <p class="text-sm text-muted-foreground mt-1">Intelligent Loan Predictions</p>
    </div>

    <div class="bg-card p-8 rounded-2xl border shadow-sm">
      <div class="mb-6">
        <h2 id="auth-title" class="text-xl font-semibold tracking-tight">Sign In</h2>
        <p id="auth-desc" class="text-sm text-muted-foreground mt-1">Enter your details to access your account</p>
      </div>

      <form id="auth-form" class="space-y-4">
        <!-- Name (signup only) -->
        <div id="name-field" class="hidden space-y-2">
          <label class="text-sm font-medium">Full Name</label>
          <div class="relative">
            <i data-lucide="user" size="16" class="absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"></i>
            <input type="text" id="full-name" class="w-full bg-background border rounded-lg px-10 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="John Doe">
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-medium">Email</label>
          <div class="relative">
            <i data-lucide="mail" size="16" class="absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"></i>
            <input type="email" id="email" required class="w-full bg-background border rounded-lg px-10 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="name@example.com">
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-medium">Password</label>
          <div class="relative">
            <i data-lucide="lock" size="16" class="absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"></i>
            <input type="password" id="password" required minlength="6" class="w-full bg-background border rounded-lg px-10 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="••••••••">
          </div>
        </div>

        <div id="error-msg" class="p-3 rounded-lg bg-destructive/10 text-destructive text-sm font-medium border border-destructive/20 hidden"></div>
        <div id="success-msg" class="p-3 rounded-lg bg-primary/10 text-primary text-sm font-medium border border-primary/20 hidden"></div>

        <button type="submit" id="submit-btn" class="w-full bg-primary text-primary-foreground py-2.5 rounded-lg text-sm font-medium shadow-sm transition-all hover:opacity-90 mt-2">
          Sign In
        </button>
      </form>

      <div class="mt-6 pt-6 border-t text-center">
        <button id="toggle-auth" class="text-sm text-primary hover:underline font-medium">
          Don't have an account? Sign Up
        </button>
      </div>
    </div>
  </div>

  <script src="js/api-client.js"></script>
  <script>
    let isLogin = true;

    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      document.getElementById('theme-toggle').onclick = () => {
        if (typeof toggleDarkMode === 'function') toggleDarkMode();
        lucide.createIcons();
      };
    });

    // Auto-redirect if already logged in
    (async () => {
      const user = await window.api.verifySession();
      if (user) window.location.href = 'index.html';
    })();

    document.getElementById('toggle-auth').onclick = () => {
      isLogin = !isLogin;
      document.getElementById('auth-title').textContent = isLogin ? 'Sign In' : 'Sign Up';
      document.getElementById('auth-desc').textContent = isLogin
        ? 'Enter your details to access your account'
        : 'Create an account to get started';
      document.getElementById('name-field').classList.toggle('hidden', isLogin);
      document.getElementById('submit-btn').textContent = isLogin ? 'Sign In' : 'Sign Up';
      document.getElementById('toggle-auth').textContent = isLogin
        ? "Don't have an account? Sign Up"
        : "Already have an account? Sign In";
      document.getElementById('error-msg').classList.add('hidden');
      document.getElementById('success-msg').classList.add('hidden');
    };

    document.getElementById('auth-form').onsubmit = async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');
      const submitBtn = document.getElementById('submit-btn');
      errorMsg.classList.add('hidden');
      successMsg.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Please wait...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const fullName = document.getElementById('full-name').value.trim();

      try {
        if (isLogin) {
          await window.api.signIn(email, password);
          window.location.href = 'index.html';
        } else {
          await window.api.signUp(email, password, fullName);
          successMsg.textContent = 'Account created! You can now sign in.';
          successMsg.classList.remove('hidden');
          // Switch to login
          setTimeout(() => {
            isLogin = true;
            document.getElementById('toggle-auth').click();
            document.getElementById('email').value = email;
          }, 1500);
        }
      } catch (err) {
        errorMsg.textContent = err.message || 'Authentication failed';
        errorMsg.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = isLogin ? 'Sign In' : 'Sign Up';
      }
    };
  </script>
</body>
</html>

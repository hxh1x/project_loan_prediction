<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lendmark - Customers</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="js/theme-config.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-background text-foreground antialiased">
  <div class="app-layout">
    <div id="sidebar-container" class="sidebar-wrapper"></div>
    <main class="main-content">
      <div class="p-8 max-w-7xl mx-auto">
        <div class="mb-8">
          <h1 class="text-2xl font-semibold tracking-tight">Customers</h1>
          <p class="text-sm text-muted-foreground mt-1">View all registered customer profiles and loan history</p>
        </div>

        <!-- Summary cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
          <div class="bg-card p-5 rounded-xl border shadow-sm">
            <p class="text-xs text-muted-foreground mb-1">Total Customers</p>
            <p id="total-customers" class="text-2xl font-bold">0</p>
          </div>
          <div class="bg-card p-5 rounded-xl border shadow-sm">
            <p class="text-xs text-muted-foreground mb-1">With Active Loans</p>
            <p id="active-loans-count" class="text-2xl font-bold text-primary">0</p>
          </div>
          <div class="bg-card p-5 rounded-xl border shadow-sm">
            <p class="text-xs text-muted-foreground mb-1">Total Approved Volume</p>
            <p id="total-loan-volume" class="text-2xl font-bold">₹0</p>
          </div>
        </div>

        <!-- Search -->
        <div class="bg-card rounded-xl border shadow-sm mb-6 p-4">
          <div class="relative">
            <i data-lucide="search" size="16" class="absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"></i>
            <input id="customer-search" oninput="renderTable()" placeholder="Search by name or account..."
              class="w-full pl-9 pr-4 py-2 text-sm bg-background border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors">
          </div>
        </div>

        <!-- Table -->
        <div class="bg-card rounded-xl border shadow-sm overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-muted/50 border-b">
                <tr>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">Customer</th>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">Account No.</th>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">Email</th>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">Loans</th>
                  <th class="px-5 py-3 text-left font-medium text-muted-foreground">Approved Amount</th>
                </tr>
              </thead>
              <tbody id="customer-table-body" class="divide-y divide-border">
                <tr><td colspan="5" class="text-center py-12 text-sm text-muted-foreground">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/api-client.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/loan-predictor.js"></script>
  <script>
    let customers = [];
    let loanSummaries = {};

    document.addEventListener('DOMContentLoaded', async () => {
      const user = await window.api.verifySession();
      if (!user) { window.location.href = 'auth.html'; return; }
      if (user.role !== 'manager') { window.location.href = 'index.html'; return; }
      window.currentUser = user;

      await initDashboard();
      await fetchData();
    });

    async function fetchData() {
      const [profiles, loans] = await Promise.all([
        window.api.getProfiles().catch(() => []),
        window.api.getApplications().catch(() => []),
      ]);

      customers = profiles;
      loanSummaries = {};
      loans.forEach(loan => {
        if (!loanSummaries[loan.user_id]) loanSummaries[loan.user_id] = { total: 0, approved: 0, amount: 0 };
        loanSummaries[loan.user_id].total++;
        if (loan.status === 'approved') {
          loanSummaries[loan.user_id].approved++;
          loanSummaries[loan.user_id].amount += loan.loan_amount;
        }
      });

      document.getElementById('total-customers').textContent = customers.length;
      document.getElementById('active-loans-count').textContent = Object.values(loanSummaries).filter(s => s.approved > 0).length;
      document.getElementById('total-loan-volume').textContent = window.loanPredictor.formatCurrency(
        Object.values(loanSummaries).reduce((s, l) => s + l.amount, 0)
      );
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('customer-table-body');
      const search = document.getElementById('customer-search').value.toLowerCase();
      const filtered = customers.filter(c =>
        (c.full_name || '').toLowerCase().includes(search) ||
        (c.account_number || '').toLowerCase().includes(search)
      );
      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-12 text-sm text-muted-foreground">No customers found</td></tr>';
        return;
      }
      tbody.innerHTML = filtered.map(c => {
        const s = loanSummaries[c.user_id] || { total: 0, approved: 0, amount: 0 };
        return `<tr class="hover:bg-muted/50 transition-colors">
          <td class="px-5 py-4">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-primary/10 border border-primary/20 flex items-center justify-center text-xs font-semibold text-primary">
                ${(c.full_name || 'U').charAt(0).toUpperCase()}
              </div>
              <span class="font-medium">${c.full_name || 'Unknown'}</span>
            </div>
          </td>
          <td class="px-5 py-4 text-muted-foreground font-mono text-xs">${c.account_number || '—'}</td>
          <td class="px-5 py-4 text-muted-foreground">${c.email || '—'}</td>
          <td class="px-5 py-4">
            <span class="text-sm">${s.approved}/${s.total}</span>
          </td>
          <td class="px-5 py-4 font-medium text-primary">${window.loanPredictor.formatCurrency(s.amount)}</td>
        </tr>`;
      }).join('');
    }
  </script>
</body>
</html>

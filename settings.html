<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lendmark - Settings</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="js/theme-config.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-background text-foreground antialiased">
  <div class="app-layout">
    <div id="sidebar-container" class="sidebar-wrapper"></div>
    <main class="main-content">
      <div class="p-8 max-w-5xl mx-auto">
        <div class="mb-8">
          <h1 class="text-2xl font-semibold tracking-tight">Settings</h1>
          <p class="text-sm text-muted-foreground">Manage your account profile and preferences.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
          <div class="bg-card p-6 rounded-xl border shadow-sm">
            <div class="flex items-center gap-4 mb-6">
              <div class="h-10 w-10 text-primary bg-primary/10 rounded-lg flex items-center justify-center border border-primary/20">
                <i data-lucide="user-cog" size="20"></i>
              </div>
              <div>
                <h3 class="text-lg font-semibold leading-none mb-1">Account Profile</h3>
                <p class="text-xs text-muted-foreground">Your personal details</p>
              </div>
            </div>
            <div id="account-info" class="space-y-4">
              <div class="animate-pulse space-y-3">
                <div class="h-4 bg-muted rounded w-1/2"></div>
                <div class="h-4 bg-muted rounded w-2/3"></div>
                <div class="h-4 bg-muted rounded w-1/3"></div>
              </div>
            </div>
          </div>

          <div id="manager-settings" class="hidden bg-card p-6 rounded-xl border border-primary/20 shadow-sm">
            <div class="flex items-center gap-4 mb-6">
              <div class="h-10 w-10 text-primary bg-primary/10 rounded-lg flex items-center justify-center border border-primary/20">
                <i data-lucide="cpu" size="20"></i>
              </div>
              <div>
                <h3 class="text-lg font-semibold leading-none mb-1">Predictive Analytics</h3>
                <p class="text-xs text-muted-foreground">Core ML Engine Info</p>
              </div>
            </div>
            <div class="space-y-3">
              <div class="flex flex-col gap-1 p-4 rounded-lg bg-muted/50 border">
                <span class="text-xs text-muted-foreground font-medium">Model Architecture</span>
                <span class="text-sm font-semibold">XGBoost Ensemble v4.2</span>
              </div>
              <div class="flex flex-col gap-1 p-4 rounded-lg bg-muted/50 border">
                <span class="text-xs text-muted-foreground font-medium">Baseline Accuracy</span>
                <div class="flex items-center gap-3 mt-1">
                  <span class="text-lg font-bold text-primary leading-none">94.8%</span>
                  <span class="px-2 py-0.5 rounded text-[10px] font-medium bg-primary/10 text-primary border border-primary/20">Stable</span>
                </div>
              </div>
              <div class="flex flex-col gap-1 p-4 rounded-lg bg-muted/50 border">
                <span class="text-xs text-muted-foreground font-medium">Training Data Rows</span>
                <span class="text-sm font-semibold">12,400 Records</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/api-client.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await window.api.verifySession();
      if (!user) { window.location.href = 'auth.html'; return; }
      window.currentUser = user;

      await initDashboard();

      const profile = await window.api.getMyProfile().catch(() => ({}));

      const items = [
        { label: "Account Holder", value: user.full_name || user.email },
        { label: "Account Number", value: profile?.account_number || '—' },
        { label: "Email Address", value: user.email },
        { label: "System Role", value: user.role.charAt(0).toUpperCase() + user.role.slice(1) },
      ];

      document.getElementById('account-info').innerHTML = items.map(item => `
        <div class="flex flex-col gap-1 pb-4 border-b last:border-0 last:pb-0">
          <span class="text-xs font-medium text-muted-foreground">${item.label}</span>
          <span class="text-sm font-medium">${item.value}</span>
        </div>`).join('');

      if (user.role === 'manager') {
        document.getElementById('manager-settings').classList.remove('hidden');
      }
      lucide.createIcons();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lendmark — Loan Applications</title>
  <meta name="description" content="Institutional record of all active and historical loan submissions.">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="js/theme-config.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-background text-foreground antialiased">
  <div class="app-layout">
    <div id="sidebar-container" class="sidebar-wrapper"></div>
    <main class="main-content">
      <div class="p-6 max-w-[1100px] mx-auto">

        <!-- Page Header -->
        <div class="page-header">
          <div class="flex items-center justify-between">
            <div>
              <h1 id="page-title">Loan Applications</h1>
              <p id="page-desc">Institutional record of all active and historical loan submissions.</p>
            </div>
          </div>
        </div>

        <!-- Summary Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
          <button id="filter-all" onclick="setFilter('all')"
            class="stat-card text-left w-full transition-all border-primary/50 bg-primary/5">
            <p class="stat-label">Total Applications</p>
            <p id="count-all" class="stat-value">0</p>
          </button>
          <button id="filter-pending" onclick="setFilter('pending')"
            class="stat-card text-left w-full transition-all">
            <p class="stat-label">Pending Review</p>
            <p id="count-pending" class="stat-value" style="color: hsl(40 55% 42%)">0</p>
          </button>
          <button id="filter-approved" onclick="setFilter('approved')"
            class="stat-card text-left w-full transition-all">
            <p class="stat-label">Approved</p>
            <p id="count-approved" class="stat-value" style="color: hsl(var(--primary))">0</p>
          </button>
          <button id="filter-rejected" onclick="setFilter('rejected')"
            class="stat-card text-left w-full transition-all">
            <p class="stat-label">Declined</p>
            <p id="count-rejected" class="stat-value" style="color: hsl(var(--destructive))">0</p>
          </button>
        </div>

        <!-- Search Bar -->
        <div class="panel mb-4">
          <div class="p-4 flex items-center gap-3">
            <i data-lucide="search" size="15" class="text-muted-foreground shrink-0"></i>
            <input type="text" id="search-input" oninput="renderTable()"
              placeholder="Search by applicant name or reference ID..."
              class="formal-input border-0 p-0 shadow-none text-sm flex-1"
              style="border:none;box-shadow:none;background:transparent;">
          </div>
        </div>

        <!-- Applications Table -->
        <div class="panel">
          <div class="panel-header">
            <h3>Application Records</h3>
            <span id="result-count" class="text-[11px] text-muted-foreground font-medium"></span>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr>
                  <th>Applicant</th>
                  <th>Loan Amount</th>
                  <th>Annual Income</th>
                  <th>CIBIL Score</th>
                  <th>ML Prediction</th>
                  <th>Status</th>
                  <th>Date</th>
                  <th class="text-center">Action</th>
                </tr>
              </thead>
              <tbody id="apps-table-body">
                <tr>
                  <td colspan="8" class="text-center py-16 text-sm text-muted-foreground italic">
                    Loading application records...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Detail Modal -->
  <div id="detail-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-[100] p-6">
    <div class="bg-card border border-border shadow-2xl w-full max-w-xl rounded overflow-hidden max-h-[90vh] overflow-y-auto">
      <!-- Modal Header -->
      <div class="card-top-bar"></div>
      <div class="p-5 border-b border-border flex items-center justify-between bg-muted/30">
        <div>
          <h3 class="font-semibold text-sm text-foreground">Application Details</h3>
          <p class="text-[11px] text-muted-foreground mt-0.5">Full review of submitted loan application.</p>
        </div>
        <button onclick="closeModal()" class="p-2 hover:bg-muted rounded text-muted-foreground hover:text-foreground transition-colors">
          <i data-lucide="x" size="16"></i>
        </button>
      </div>
      <div id="modal-body" class="p-6"></div>
    </div>
  </div>

  <script src="js/api-client.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/loan-predictor.js"></script>
  <script>
    let allApps = [];
    let currentFilter = 'all';
    let isManager = false;

    document.addEventListener('DOMContentLoaded', async () => {
      const user = await window.api.verifySession();
      if (!user) { window.location.href = 'auth.html'; return; }
      isManager = user.role === 'manager';
      window.currentUser = user;

      document.getElementById('page-title').textContent = isManager ? 'Loan Application Queue' : 'My Applications';
      document.getElementById('page-desc').textContent  = isManager
        ? 'Review and manage all pending and processed loan applications.'
        : 'History of your submitted loan applications and their current status.';

      await initDashboard();
      await fetchApplications();
    });

    async function fetchApplications() {
      try {
        allApps = await window.api.getApplications();
        updateCounts();
        renderTable();
      } catch (err) { console.error(err); }
    }

    function updateCounts() {
      document.getElementById('count-all').textContent      = allApps.length;
      document.getElementById('count-pending').textContent  = allApps.filter(a => a.status === 'pending').length;
      document.getElementById('count-approved').textContent = allApps.filter(a => a.status === 'approved').length;
      document.getElementById('count-rejected').textContent = allApps.filter(a => a.status === 'rejected').length;
    }

    function setFilter(filter) {
      currentFilter = filter;
      ['all','pending','approved','rejected'].forEach(f => {
        const el = document.getElementById(`filter-${f}`);
        el.style.borderColor = '';
        el.style.background  = '';
      });
      const active = document.getElementById(`filter-${filter}`);
      active.style.borderColor = 'hsl(var(--primary) / 0.4)';
      active.style.background  = 'hsl(var(--primary) / 0.05)';
      renderTable();
    }

    function renderTable() {
      const tbody  = document.getElementById('apps-table-body');
      const search = document.getElementById('search-input').value.toLowerCase();
      const filtered = allApps.filter(a =>
        (currentFilter === 'all' || a.status === currentFilter) &&
        (!search || (a.applicant_name || '').toLowerCase().includes(search))
      );

      document.getElementById('result-count').textContent = `${filtered.length} record${filtered.length !== 1 ? 's' : ''}`;

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-16 text-sm text-muted-foreground italic">No records match the current filter criteria.</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(a => {
        const predBadge = s => s === 'Approved'
          ? `<span class="badge badge-approved">${s}</span>`
          : `<span class="badge badge-rejected">${s}</span>`;
        const statusBadge = s => ({
          pending:  `<span class="badge badge-pending">Pending</span>`,
          approved: `<span class="badge badge-approved">Approved</span>`,
          rejected: `<span class="badge badge-rejected">Declined</span>`,
        }[s] || `<span class="badge">${s}</span>`);

        return `
        <tr class="hover:bg-muted/5 transition-colors border-b last:border-0 group">
          <td class="px-6 py-4">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded bg-primary/10 border border-primary/20 flex items-center justify-center overflow-hidden text-[10px] font-black text-primary shrink-0">
                ${a.profile_photo 
                  ? `<img src="/uploads/${a.profile_photo}" class="w-full h-full object-cover">`
                  : (a.applicant_name || 'U').charAt(0).toUpperCase()}
              </div>
              <div>
                <p class="font-semibold text-foreground text-xs">${a.applicant_name}</p>
                <p class="text-[10px] text-muted-foreground mt-0.5 uppercase tracking-wide font-medium">Ref: ${a.id.split('-')[0].toUpperCase()}</p>
              </div>
            </div>
          </td>
          <td class="font-semibold text-foreground text-xs">${window.loanPredictor.formatCurrency(a.loan_amount)}</td>
          <td class="text-muted-foreground text-xs font-number">${window.loanPredictor.formatCurrency(a.income_annum)}</td>
          <td>
            <div class="flex items-center gap-2">
              <span class="text-xs font-bold text-foreground w-8 font-number">${a.cibil_score}</span>
              <div class="w-16 h-1 bg-muted rounded-full overflow-hidden">
                <div class="h-full rounded-full" style="width:${(a.cibil_score/900)*100}%; background:hsl(var(--primary))"></div>
              </div>
            </div>
          </td>
          <td>${predBadge(a.prediction_status)} <span class="text-[10px] text-muted-foreground ml-1 font-number">${parseFloat(a.confidence).toFixed(1)}%</span></td>
          <td>${statusBadge(a.status)}</td>
          <td class="text-[11px] text-muted-foreground font-number">${new Date(a.created_at).toLocaleDateString('en-IN')}</td>
          <td class="text-center">
            <button onclick="viewDetails('${a.id}')" class="btn-secondary text-xs py-1.5 px-3 gap-1.5">
              <i data-lucide="eye" size="13"></i> View
            </button>
          </td>
        </tr>`;
      }).join('');
      lucide.createIcons();
    }

    function viewDetails(id) {
      const a = allApps.find(x => x.id === id);
      const modal = document.getElementById('detail-modal');
      const isAppr = a.prediction_status === 'Approved';

      document.getElementById('modal-body').innerHTML = `
        <div class="space-y-8">
          <div class="flex items-center gap-5 p-5 bg-primary/5 rounded border border-primary/10">
            <div class="w-16 h-16 rounded-lg bg-white border-2 border-primary/20 flex items-center justify-center overflow-hidden shadow-sm shrink-0">
              ${a.profile_photo 
                ? `<img src="/uploads/${a.profile_photo}" class="w-full h-full object-cover">`
                : `<i data-lucide="user" size="32" class="text-primary/20"></i>`}
            </div>
            <div>
              <p class="text-[10px] font-black uppercase tracking-[0.3em] text-primary mb-1">Applicant Registry</p>
              <h3 class="text-2xl font-serif font-bold text-foreground">${a.applicant_name}</h3>
              <p class="text-[10px] text-muted-foreground font-black uppercase tracking-wider">Reference ID: ${a.id.toUpperCase()}</p>
            </div>
          </div>

          <div>
            <h4 class="text-[11px] font-black uppercase tracking-[0.2em] text-muted-foreground mb-4 border-b pb-2">Financial Registry</h4>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
              <div class="p-3 bg-muted/20 rounded border border-border/50">
                <p class="text-[9px] font-bold uppercase tracking-widest text-muted-foreground mb-1">Annual Revenue</p>
                <p class="text-sm font-number font-bold text-foreground">${window.loanPredictor.formatCurrency(a.income_annum)}</p>
              </div>
              <div class="p-3 bg-muted/20 rounded border border-border/50">
                <p class="text-[9px] font-bold uppercase tracking-widest text-muted-foreground mb-1">Principal Requested</p>
                <p class="text-sm font-number font-bold text-foreground">${window.loanPredictor.formatCurrency(a.loan_amount)}</p>
              </div>
              <div class="p-3 bg-muted/20 rounded border border-border/50">
                <p class="text-[9px] font-bold uppercase tracking-widest text-muted-foreground mb-1">Amortization</p>
                <p class="text-sm font-bold text-foreground">${a.loan_term} Months</p>
              </div>
              <div class="p-3 bg-muted/20 rounded border border-border/50">
                <p class="text-[9px] font-bold uppercase tracking-widest text-muted-foreground mb-1">Monthly Settlement</p>
                <p class="text-sm font-number font-bold text-primary">${window.loanPredictor.formatCurrency(a.monthly_emi || 0)}</p>
              </div>
              <div class="p-3 bg-muted/20 rounded border border-border/50">
                <p class="text-[9px] font-bold uppercase tracking-widest text-muted-foreground mb-1">Credit Score</p>
                <p class="text-sm font-number font-bold text-foreground">${a.cibil_score || 'N/A'}</p>
              </div>
              <div class="p-3 bg-muted/20 rounded border border-border/50">
                <p class="text-[9px] font-bold uppercase tracking-widest text-muted-foreground mb-1">Education Tier</p>
                <p class="text-sm font-bold text-foreground">${a.education || 'Graduate'}</p>
              </div>
            </div>
          </div>

          <div>
            <h4 class="text-[11px] font-black uppercase tracking-[0.2em] text-muted-foreground mb-4 border-b pb-2">Asset Portfolio</h4>
            <div class="grid grid-cols-2 gap-4">
              <div class="flex justify-between items-center p-3 border-b border-border/40">
                <span class="text-[10px] font-bold uppercase text-muted-foreground">Residential Value</span>
                <span class="text-xs font-number font-bold">${window.loanPredictor.formatCurrency(a.residential_assets_value || 0)}</span>
              </div>
              <div class="flex justify-between items-center p-3 border-b border-border/40">
                <span class="text-[10px] font-bold uppercase text-muted-foreground">Commercial Value</span>
                <span class="text-xs font-number font-bold">${window.loanPredictor.formatCurrency(a.commercial_assets_value || 0)}</span>
              </div>
              <div class="flex justify-between items-center p-3 border-b border-border/40">
                <span class="text-[10px] font-bold uppercase text-muted-foreground">Luxury Holdings</span>
                <span class="text-xs font-number font-bold">${window.loanPredictor.formatCurrency(a.luxury_assets_value || 0)}</span>
              </div>
              <div class="flex justify-between items-center p-3 border-b border-border/40">
                <span class="text-[10px] font-bold uppercase text-muted-foreground">Liquid Capital (Bank)</span>
                <span class="text-xs font-number font-bold">${window.loanPredictor.formatCurrency(a.bank_asset_value || 0)}</span>
              </div>
            </div>
          </div>

          <div class="p-6 bg-sidebar-background text-sidebar-foreground rounded-lg border border-sidebar-border relative overflow-hidden group">
            <div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-full -mr-16 -mt-16 group-hover:scale-110 transition-transform"></div>
            <div class="relative z-10">
              <div class="flex items-center justify-between mb-6">
                <div>
                  <p class="text-[10px] font-black uppercase tracking-[0.2em] opacity-50 mb-1">Predictive Analytics</p>
                  <h4 class="text-lg font-serif font-bold">Institutional Risk Audit</h4>
                </div>
                <div class="badge ${isAppr ? 'badge-approved' : 'badge-rejected'} py-1 px-4 text-[10px] font-bold">${a.prediction_status}</div>
              </div>
              <div class="grid grid-cols-2 gap-8">
                <div>
                  <p class="text-[9px] font-black uppercase opacity-40 mb-2">Model Confidence</p>
                  <p class="text-2xl font-number font-bold">${parseFloat(a.confidence).toFixed(1)}%</p>
                </div>
                <div>
                  <p class="text-[9px] font-black uppercase opacity-40 mb-2">Loss Probability (PD)</p>
                  <p class="text-2xl font-number font-bold text-primary-foreground">${parseFloat(a.risk_score || 0).toFixed(1)}%</p>
                </div>
              </div>
            </div>
          </div>

          ${isManager && a.status === 'pending' ? `
            <div class="pt-6 border-t border-border flex gap-4">
              <button onclick="decide('${a.id}','approved')" class="btn-primary flex-1 justify-center py-3 text-xs font-black uppercase tracking-widest">
                <i data-lucide="check" size="14"></i> Approve Asset
              </button>
              <button onclick="decide('${a.id}','rejected')" class="btn-secondary flex-1 justify-center py-3 text-xs font-black uppercase tracking-widest text-destructive hover:bg-destructive hover:text-white border-destructive/20">
                <i data-lucide="x" size="14"></i> Decline Submission
              </button>
            </div>
          ` : `
            <div class="p-4 bg-muted/20 rounded border border-border/40 text-center">
              <p class="text-[10px] font-black uppercase tracking-[0.2em] text-muted-foreground">Audit Status: <span class="text-foreground font-bold">${a.status.toUpperCase()}</span></p>
            </div>
          `}
        </div>
      `;
      lucide.createIcons();
      modal.classList.remove('hidden');
    }

    function closeModal() { document.getElementById('detail-modal').classList.add('hidden'); }

    async function decide(id, status) {
      const label = status === 'approved' ? 'Approve' : 'Decline';
      if (!confirm(`Confirm: ${label} this loan application?`)) return;
      try {
        await window.api.updateApplication(id, { status });
        closeModal();
        await fetchApplications();
      } catch (err) { alert(err.message); }
    }
  </script>
</body>
</html>

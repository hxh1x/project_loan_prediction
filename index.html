<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lendmark - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="js/theme-config.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-background text-foreground antialiased">
  <div class="app-layout">
    <div id="sidebar-container" class="sidebar-wrapper"></div>
    <main class="main-content">
      <div class="p-8 max-w-7xl mx-auto">
        <div id="dashboard-content">
          <h1 class="text-2xl font-semibold tracking-tight mb-2">Dashboard</h1>
          <p class="text-muted-foreground text-sm animate-pulse">Loading...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="js/api-client.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/loan-predictor.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await window.api.verifySession();
      if (!user) { window.location.href = 'auth.html'; return; }
      window.currentUser = user;
      await initDashboard();

      if (user.role === 'manager') {
        loadManagerDashboard();
      } else {
        loadCustomerDashboard();
      }
    });

    async function loadCustomerDashboard() {
      const content = document.getElementById('dashboard-content');
      const stats = await window.api.getCustomerStats().catch(() => ({ balance: 0, active_loans: 0, total_applications: 0 }));
      content.innerHTML = `
        <div class="mb-8">
          <h1 class="text-2xl font-semibold tracking-tight">Overview</h1>
          <p class="text-sm text-muted-foreground mt-1">Monitor your financial profile and latest activity.</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="bg-card p-6 rounded-xl border shadow-sm">
            <h3 class="text-sm font-medium text-muted-foreground mb-4 flex items-center gap-2">
              <i data-lucide="wallet" size="16"></i> Available Balance
            </h3>
            <p class="text-3xl font-semibold tracking-tight">${window.loanPredictor.formatCurrency(stats.balance)}</p>
          </div>
          <div class="bg-card p-6 rounded-xl border shadow-sm">
            <h3 class="text-sm font-medium text-muted-foreground mb-4 flex items-center gap-2">
              <i data-lucide="file-text" size="16"></i> Active Loans
            </h3>
            <p class="text-3xl font-semibold tracking-tight">${stats.active_loans}</p>
          </div>
          <div class="bg-card p-6 rounded-xl border shadow-sm">
            <h3 class="text-sm font-medium text-muted-foreground mb-4 flex items-center gap-2">
              <i data-lucide="file-check" size="16" class="text-primary"></i> Total Applications
            </h3>
            <p class="text-3xl font-semibold tracking-tight">${stats.total_applications}</p>
          </div>
        </div>`;
      lucide.createIcons();
    }

    async function loadManagerDashboard() {
      const content = document.getElementById('dashboard-content');
      const stats = await window.api.getManagerStats().catch(() => ({ approved_volume: 0, pending_count: 0, total_customers: 0 }));
      content.innerHTML = `
        <div class="mb-8">
          <h1 class="text-2xl font-semibold tracking-tight">System Overview</h1>
          <p class="text-sm text-muted-foreground mt-1">Review organizational metrics and application pipeline.</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="bg-card p-6 rounded-xl border shadow-sm">
            <h3 class="text-sm font-medium text-muted-foreground mb-4 flex items-center gap-2">
              <i data-lucide="briefcase" size="16"></i> Approved Volume
            </h3>
            <p class="text-3xl font-semibold tracking-tight">${window.loanPredictor.formatCurrency(stats.approved_volume)}</p>
          </div>
          <div class="bg-card p-6 rounded-xl border shadow-sm">
            <h3 class="text-sm font-medium text-muted-foreground mb-4 flex items-center gap-2">
              <i data-lucide="clock" size="16"></i> Pending Decision
            </h3>
            <p class="text-3xl font-semibold tracking-tight">${stats.pending_count}</p>
          </div>
          <div class="bg-card p-6 rounded-xl border shadow-sm">
            <h3 class="text-sm font-medium text-muted-foreground mb-4 flex items-center gap-2">
              <i data-lucide="users" size="16"></i> Total Customers
            </h3>
            <p class="text-3xl font-semibold tracking-tight">${stats.total_customers}</p>
          </div>
        </div>`;
      lucide.createIcons();
    }
  </script>
</body>
</html>
